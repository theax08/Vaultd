# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "79db66e7cd8089f1a37f61601cbc92bc"
name = "Vaultd"
application_url = "https://vaultd-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = [ "orders/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/api/webhooks"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/subscriptions/update"
  topics = [ "app_subscriptions/update" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,write_metaobject_definitions,write_metaobjects,write_products"

[auth]
redirect_urls = [
  "https://vaultd-production.up.railway.app/auth/callback",
  "https://vaultd-production.up.railway.app/app/billing/return",
  "https://vaultd-production.up.railway.app/app/billing/link-return"
]

[app_proxy]
url = "https://vaultd-production.up.railway.app"
subpath = "hype"
prefix = "apps"
